name: Benchmarks

# Wall-clock benchmarks are informational, never a pass/fail gate (shared runners
# are noisy — performance is gated by the deterministic guard tests in the `CI`
# workflow). This job runs the divan benches on every pull request, on the main
# branch, and on demand; it renders a report into the run summary (real-world
# language-server rows link to the exact source line they measured) and uploads
# the raw + parsed results. A pull-request run uses a short per-benchmark settle
# time (see `DIVAN_MAX_TIME` below) so the whole suite finishes in roughly the
# time the test job takes; it still executes every benchmark — catching a bench
# that fails to build-and-run or whose Fai-vs-Rust result diverges from the
# oracle — but its timings are a rough, human-read report, not a gate. The main /
# on-demand run keeps the long settle time for steady medians.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Serialize runs per ref. A new push to a pull request supersedes its in-flight
# run (the rough PR report has no value once stale); a main / on-demand run is
# never cancelled, so the long informational report always completes.
concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: never

jobs:
  bench:
    name: divan benchmarks
    runs-on: ubuntu-latest
    # A pull-request run (short settle time) finishes in minutes; cap it well below
    # the main run's generous budget so a benchmark that hangs fails fast.
    timeout-minutes: ${{ github.event_name == 'pull_request' && 30 || 150 }}
    steps:
      - uses: actions/checkout@v4

      - name: Select pinned toolchain
        run: |
          cargo --version
          rustc --version

      - uses: Swatinem/rust-cache@v2

      - name: Run benchmarks
        # `DIVAN_MAX_TIME` caps the wall time per benchmarked function. A
        # pull-request run uses a short cap (1s) so the whole suite finishes
        # quickly while still executing every benchmark once — the value is a rough
        # report, never a gate. The main / on-demand run uses a generous cap (120s):
        # enough for the process-spawn benches (algorithms_aot, the daemon e2e at
        # 200 modules, the fai test loop) to reach divan's full ~100-sample target
        # for steadier medians, while still bounding any pathological function.
        # `pipefail` surfaces a benchmark that actually crashes or whose result
        # diverges from its oracle (a bug, not a perf regression) while still
        # capturing the output rendered below.
        env:
          DIVAN_MAX_TIME: ${{ github.event_name == 'pull_request' && '1' || '120' }}
        run: |
          set -o pipefail
          mkdir -p target
          cargo bench --workspace --benches --locked 2>&1 | tee target/bench-output.txt

      - name: Render report
        if: always()
        # Appends a Markdown report to the run summary ($GITHUB_STEP_SUMMARY) and
        # writes the parsed JSON artifact. Reads GITHUB_SERVER_URL/REPOSITORY/SHA
        # to link real-world rows to their source line. Never fails the build.
        run: cargo run -q -p fai-tests --bin bench-summary -- target/bench-output.txt target/bench-results.json

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            target/bench-output.txt
            target/bench-results.json
          if-no-files-found: ignore
