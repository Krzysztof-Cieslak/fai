name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: build / lint / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The first cargo invocation makes rustup install the toolchain pinned by
      # rust-toolchain.toml, together with its rustfmt and clippy components.
      - name: Select pinned toolchain
        run: |
          cargo --version
          rustc --version
          cargo clippy --version
          cargo fmt --version

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Build
        run: cargo build --workspace --all-targets --locked

      - name: Test
        # Run the property tests at a higher case count than proptest's local
        # default (256) for deeper fuzzing in CI, while keeping the developer
        # inner loop fast. Saved counterexamples live in each crate's committed
        # `proptest-regressions/` directory and are always replayed first.
        env:
          PROPTEST_CASES: "2048"
        run: cargo test --workspace --locked
