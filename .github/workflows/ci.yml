name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

# Use bash on every OS (Git Bash on Windows) so the steps below are identical
# across the matrix.
defaults:
  run:
    shell: bash

jobs:
  check:
    name: build / lint / test
    strategy:
      # Report every OS's result instead of cancelling the matrix on the first
      # failure.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # The AOT linker (`fai build`) shells out to the host's system linker. On
      # Windows that is MSVC `link.exe`, which needs the Visual Studio
      # environment (PATH/LIB/INCLUDE) — export it for the build/test steps.
      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # Guarantee a `python` on PATH for the test-summary step on every runner.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # The first cargo invocation makes rustup install the toolchain pinned by
      # rust-toolchain.toml, together with its rustfmt and clippy components.
      - name: Select pinned toolchain
        run: |
          cargo --version
          rustc --version
          cargo clippy --version
          cargo fmt --version

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Build
        run: cargo build --workspace --all-targets --locked

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Test
        # nextest prints a clean, scannable per-test summary and a tidy final
        # tally instead of the default run's wall of output. The raised case
        # count fuzzes the property tests harder than the local default (256);
        # committed `proptest-regressions/` seeds always replay first. The `ci`
        # profile (.config/nextest.toml) writes the JUnit report rendered below.
        env:
          PROPTEST_CASES: "2048"
        run: cargo nextest run --workspace --locked --profile ci

      - name: Doctests
        # nextest does not run doctests yet, so cover them separately.
        run: cargo test --workspace --locked --doc

      - name: Test summary
        # Render the JUnit report into the run's job summary, even on failure.
        if: always()
        run: python scripts/junit-summary.py target/nextest/ci/junit.xml

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # Artifact names must be unique across matrix jobs in a run.
          name: junit-report-${{ matrix.os }}
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore
