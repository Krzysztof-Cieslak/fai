# cargo-nextest configuration.
#
# The `ci` profile is used by the GitHub workflow: it runs every test (no
# fail-fast) so the reported summary is complete, prints failures inline and
# again in a final recap for easy scanning of long logs, and writes a JUnit
# report that the workflow renders into the run's job summary.

[profile.ci]
fail-fast = false
failure-output = "immediate-final"
final-status-level = "fail"

[profile.ci.junit]
path = "junit.xml"
